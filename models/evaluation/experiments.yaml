# Configuration consumed by run_experiments.py.
#
# Note on weight names (Ultralytics convention):
#   YOLOv8  -> yolov8n-pose.pt   (keeps the "v")
#   YOLO11  -> yolo11n-pose.pt    (no "v")
#   YOLO26  -> yolo26n-pose.pt    (no "v")

# Shared across every experiment.
data_config: models/evaluation/data.yaml
out_dir: pose_results
runs_dir: runs_pose

# Applied to every experiment unless explicitly overridden below.
defaults:
  epochs: 100
  batch: 16
  imgsz: 640
  lr0: 0.01
  lrf: 0.01
  pose: 12.0
  kobj: 1.0
  patience: 50
  device: "0"

# Explicit list: each entry is one full run over the four insect groups.
experiments:
  - model: yolo11n-pose.pt
  - model: yolov8n-pose.pt

# Optional grid: expanded into the full Cartesian product and appended to the
# explicit list above. Comment this block out if you only want the list.
grid:
  model:
    - yolo26n-pose.pt
    - yolo26s-pose.pt
    - yolo26m-pose.pt
    - yolo26l-pose.pt
    - yolo26x-pose.pt
  lr0:
    - 0.01
    - 0.005
  pose:
    - 12.0
    - 20.0
