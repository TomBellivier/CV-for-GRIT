# COCO8-pose dataset (first 8 images from COCO train2017) by Ultralytics
# Documentation: https://docs.ultralytics.com/datasets/pose/coco8-pose/
# Example usage: yolo train data=coco8-pose.yaml
# parent
# ├── ultralytics
# └── datasets
#     └── coco8-pose ← downloads here (1 MB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: coco8-pose # dataset root dir
train: images/train  # train images (relative to 'path') 4 images
val: images/val # val images (relative to 'path') 4 images
test: images/test # test images (optional)

# Keypoints
kpt_shape: [42, 3] # number of keypoints, number of dims (2 for x,y or 3 for x,y,visible)
skeleton: [[0, 5], [0, 12], [0, 15], [12, 13], [13, 14], [15, 16], [16, 17], [5, 6], [5, 7], [6, 8], [7, 8], [8, 9], [8, 10], [9, 11], [10, 11], [8, 18], [18, 20], [18, 21], [19, 20], [19, 21], [8, 22], [22, 24], [22, 25], [23, 24], [23, 25], [8, 26], [26, 28], [26, 29], [27, 28], [27, 29], [8, 30], [30, 32], [30, 33], [31, 32], [31, 33], [8, 34], [34, 35], [35, 36], [36, 37], [8, 38], [38, 39], [39, 40], [40, 41]]
flip_idx: [0, 2, 1, 4, 3, 5, 7, 6, 8, 10, 9, 11, 15, 16, 17, 12, 13, 14, 22, 23, 24, 25, 18, 19, 20, 21, 30, 31, 32, 33, 26, 27, 28, 29, 38, 39, 40, 41, 34, 35, 36, 37]

# Classes
names:
  0: insects

# Keypoint names per class
kpt_names:
  0:
    - head-top
    - head-left
    - head-right
    - left-eye
    - right-eye
    - neck
    - thorax-left
    - thorax-right
    - thorax-bottom
    - body-left
    - body-right
    - body-tip
    - left-antenna-0
    - left-antenna-1
    - left-antenna-2
    - right-antenna-0
    - right-antenna-1
    - right-antenna-2
    - left-forewing-base
    - left-forewing-tip
    - left-forewing-front
    - left-forewing-rear
    - right-forewing-base
    - right-forewing-tip
    - right-forewing-front
    - right-forewing-rear
    - left-hindwing-base
    - left-hindwing-tip
    - left-hindwing-front
    - left-hindwing-rear
    - right-hindwing-base
    - right-hindwing-tip
    - right-hindwing-front
    - right-hindwing-rear
    - left-leg-0
    - left-leg-1
    - left-leg-2
    - left-leg-3
